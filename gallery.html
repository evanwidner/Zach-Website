<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Zachary Eldred</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loader" id="loader">
    <div class="loader__logo">
      <svg class="loader__svg" viewBox="0 0 340 80" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="apGL" cx="35%" cy="28%" r="72%">
            <stop offset="0%" stop-color="#f4df88"/>
            <stop offset="55%" stop-color="#c8a45a"/>
            <stop offset="100%" stop-color="#7a5018"/>
          </radialGradient>
        </defs>
        <g transform="translate(40,40)">
          <circle r="30" fill="#0d0d0d"/>
          <circle r="30" fill="none" stroke="rgba(200,164,90,0.25)" stroke-width="1.2"/>
          <g class="loader-aperture-blades">
            <path d="M 4 3 L 25 -14.5 A 29 29 0 0 1 25 14.5 L 4 -3 Z" fill="url(#apGL)" opacity="0.9" transform="rotate(0)"/>
            <path d="M 4 3 L 25 -14.5 A 29 29 0 0 1 25 14.5 L 4 -3 Z" fill="url(#apGL)" opacity="0.9" transform="rotate(60)"/>
            <path d="M 4 3 L 25 -14.5 A 29 29 0 0 1 25 14.5 L 4 -3 Z" fill="url(#apGL)" opacity="0.9" transform="rotate(120)"/>
            <path d="M 4 3 L 25 -14.5 A 29 29 0 0 1 25 14.5 L 4 -3 Z" fill="url(#apGL)" opacity="0.9" transform="rotate(180)"/>
            <path d="M 4 3 L 25 -14.5 A 29 29 0 0 1 25 14.5 L 4 -3 Z" fill="url(#apGL)" opacity="0.9" transform="rotate(240)"/>
            <path d="M 4 3 L 25 -14.5 A 29 29 0 0 1 25 14.5 L 4 -3 Z" fill="url(#apGL)" opacity="0.9" transform="rotate(300)"/>
          </g>
          <circle r="8" fill="#0a0a0a"/>
        </g>
        <text x="210" y="29" text-anchor="middle" font-family="'Playfair Display', serif" font-size="18" fill="#f0f0f0" font-weight="600" letter-spacing="4.5">ZACHARY ELDRED</text>
        <text x="210" y="51" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#c8a45a" letter-spacing="3.5">— PHOTOGRAPHY —</text>
      </svg>
    </div>
  </div>

  <!-- Page Transition Overlay -->
  <div class="page-transition" id="pageTransition"></div>

  <!-- Custom Cursor -->
  <div class="cursor" id="cursor">
    <div class="cursor__dot"></div>
    <div class="cursor__ring"></div>
  </div>

  <!-- Film Grain Overlay -->
  <div class="grain-overlay"></div>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <a href="index.html" class="nav__logo magnetic" data-strength="0.3">
      <svg class="nav-logo-svg" viewBox="0 0 175 32" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="apGN" cx="35%" cy="28%" r="72%">
            <stop offset="0%" stop-color="#f4df88"/>
            <stop offset="55%" stop-color="#c8a45a"/>
            <stop offset="100%" stop-color="#7a5018"/>
          </radialGradient>
        </defs>
        <g transform="translate(16,16)">
          <circle r="14.5" fill="#0d0d0d"/>
          <circle r="14.5" fill="none" stroke="rgba(200,164,90,0.3)" stroke-width="0.7"/>
          <g class="nav-aperture-blades">
            <path d="M 2 1.5 L 12 -7 A 14 14 0 0 1 12 7 L 2 -1.5 Z" fill="url(#apGN)" opacity="0.9" transform="rotate(0)"/>
            <path d="M 2 1.5 L 12 -7 A 14 14 0 0 1 12 7 L 2 -1.5 Z" fill="url(#apGN)" opacity="0.9" transform="rotate(60)"/>
            <path d="M 2 1.5 L 12 -7 A 14 14 0 0 1 12 7 L 2 -1.5 Z" fill="url(#apGN)" opacity="0.9" transform="rotate(120)"/>
            <path d="M 2 1.5 L 12 -7 A 14 14 0 0 1 12 7 L 2 -1.5 Z" fill="url(#apGN)" opacity="0.9" transform="rotate(180)"/>
            <path d="M 2 1.5 L 12 -7 A 14 14 0 0 1 12 7 L 2 -1.5 Z" fill="url(#apGN)" opacity="0.9" transform="rotate(240)"/>
            <path d="M 2 1.5 L 12 -7 A 14 14 0 0 1 12 7 L 2 -1.5 Z" fill="url(#apGN)" opacity="0.9" transform="rotate(300)"/>
          </g>
          <circle r="3.5" fill="#0a0a0a"/>
        </g>
        <text x="106" y="13" text-anchor="middle" font-family="'Playfair Display', serif" font-size="9.5" fill="#f0f0f0" font-weight="600" letter-spacing="2.5">ZACHARY ELDRED</text>
        <text x="106" y="24.5" text-anchor="middle" font-family="Inter, sans-serif" font-size="5.5" fill="#c8a45a" letter-spacing="2">— PHOTOGRAPHY —</text>
      </svg>
    </a>
    <button class="nav__toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__links" id="navLinks">
      <li><a href="index.html" class="magnetic" data-strength="0.4">About</a></li>
      <li><a href="gallery.html" class="active magnetic" data-strength="0.4">Portfolio</a></li>
      <li><a href="process.html" class="magnetic" data-strength="0.4">Process</a></li>
      <li><a href="contact.html" class="magnetic" data-strength="0.4">Contact</a></li>
    </ul>
  </nav>

  <!-- Gallery Hero -->
  <section class="gallery-hero">
    <h1>Portfolio</h1>
    <p>A curated collection of moments, machines, and landscapes.</p>
  </section>

  <!-- View Toggle -->
  <div class="gallery-controls">
    <div class="gallery-filters" id="galleryFilters">
      <button class="filter-btn glow-subtle magnetic active" data-filter="all" data-strength="0.2">All</button>
      <button class="filter-btn glow-subtle magnetic" data-filter="portrait" data-strength="0.2">Portraits</button>
      <button class="filter-btn glow-subtle magnetic" data-filter="automotive" data-strength="0.2">Automotive</button>
      <button class="filter-btn glow-subtle magnetic" data-filter="sports" data-strength="0.2">Sports</button>
      <button class="filter-btn glow-subtle magnetic" data-filter="landscape" data-strength="0.2">Landscapes</button>
      <button class="filter-btn glow-subtle magnetic" data-filter="product" data-strength="0.2">Products</button>
    </div>
    <div class="gallery-view-toggle">
      <button class="view-btn active" data-view="grid" title="Grid View">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="7" height="7"/><rect x="9" y="0" width="7" height="7"/><rect x="0" y="9" width="7" height="7"/><rect x="9" y="9" width="7" height="7"/></svg>
      </button>
      <button class="view-btn" data-view="horizontal" title="Horizontal Scroll">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="2" width="4" height="12"/><rect x="6" y="2" width="4" height="12"/><rect x="12" y="2" width="4" height="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Masonry Gallery Grid — populated by js/gallery.js -->
  <div class="gallery-grid" id="galleryGrid">
    <!-- Photos load from Supabase -->
  </div>

  <!-- Horizontal Drag Gallery — populated by js/gallery.js -->
  <div class="gallery-horizontal" id="galleryHorizontal" style="display:none;">
    <div class="gallery-horizontal__track" id="horizontalTrack">
      <!-- Photos load from Supabase -->
      <div class="gallery-horizontal__hint">Drag to scroll &rarr;</div>
    </div>
  </div>

  <!-- GSAP Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox__backdrop"></div>
    <button class="lightbox__close" id="lightboxClose">&times;</button>
    <div class="lightbox__image-wrap" id="lightboxImageWrap">
      <div class="lightbox__content" id="lightboxContent"></div>
    </div>
    <div class="lightbox__info" id="lightboxInfo">
      <span class="lightbox__title" id="lightboxTitle"></span>
      <span class="lightbox__cat" id="lightboxCat"></span>
    </div>
    <div class="lightbox__nav">
      <button class="lightbox__prev" id="lightboxPrev">&larr;</button>
      <button class="lightbox__next" id="lightboxNext">&rarr;</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__container">
      <div class="footer__brand">
        <span class="footer__logo">Zachary Eldred</span>
        <p class="footer__copy">&copy; 2026 All rights reserved.</p>
      </div>
      <div class="footer__social">
        <a href="#" class="magnetic" data-strength="0.3">Instagram</a>
        <a href="#" class="magnetic" data-strength="0.3">Email</a>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
  <script src="js/main.js"></script>
  <script type="module" src="js/gallery.js"></script>
</body>
</html>
